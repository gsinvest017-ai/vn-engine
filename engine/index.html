<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VN Engine</title>
  <link rel="stylesheet" href="css/engine.css">
</head>
<body>
  <div id="vn-root">

    <!-- ── 主選單 ── -->
    <div id="main-menu" class="layer active">
      <div id="menu-bg">
        <!-- animated water-ripple canvas -->
        <canvas id="menu-canvas"></canvas>
      </div>
      <div id="menu-content">
        <div id="menu-logo">
          <h1 id="game-title">暗渠之書</h1>
          <p id="game-subtitle">台中舊城的記憶</p>
        </div>
        <nav id="menu-buttons">
          <button class="menu-btn" data-action="start">開始遊戲</button>
          <button class="menu-btn" data-action="load">讀取存檔</button>
          <button class="menu-btn" data-action="settings">設定</button>
        </nav>
        <p id="menu-version">暗渠之書 v1.0 · 台中舊城偵探物語</p>
      </div>
    </div>

    <!-- ── 遊戲畫面 ── -->
    <div id="game-screen" class="layer">

      <!-- 背景層 -->
      <div id="bg-layer">
        <div id="bg-a" class="bg-image"></div>
        <div id="bg-b" class="bg-image" style="opacity:0"></div>
      </div>

      <!-- 天氣 Canvas -->
      <canvas id="weather-canvas"></canvas>

      <!-- 膠片古舊覆蓋層 (grain + scanlines + warm tint) -->
      <canvas id="grain-canvas"></canvas>
      <div id="fx-scanlines"></div>
      <div id="fx-aged-tint"></div>
      <div id="fx-vignette-static"></div>

      <!-- 特效層 -->
      <div id="effects-layer">
        <div id="fx-dim"></div>
        <div id="fx-flash"></div>
        <div id="fx-fade"></div>
        <div id="fx-vignette"></div>
      </div>

      <!-- 角色層 -->
      <div id="characters-layer">
        <div class="char-slot" id="slot-left"   data-pos="left"></div>
        <div class="char-slot" id="slot-center" data-pos="center"></div>
        <div class="char-slot" id="slot-right"  data-pos="right"></div>
      </div>

      <!-- UI 層 -->
      <div id="ui-layer">
        <!-- 章節標題 -->
        <div id="chapter-card" class="hidden">
          <div id="chapter-num"></div>
          <div id="chapter-name"></div>
        </div>

        <!-- 對話框 -->
        <div id="textbox" class="hidden">
          <div id="speaker-strip">
            <span id="speaker-name"></span>
          </div>
          <div id="text-area">
            <p id="dialogue-text"></p>
          </div>
          <span id="advance-arrow" class="blink">▼</span>
        </div>

        <!-- 選擇框 -->
        <div id="choice-box" class="hidden">
          <p id="choice-prompt"></p>
          <div id="choice-options"></div>
        </div>

        <!-- Suspense end message layer -->
        <div id="fx-suspense-msg"><span></span></div>

      <!-- HUD -->
        <div id="hud">
          <button class="hud-btn" id="hud-menu"    title="選單">☰</button>
          <button class="hud-btn" id="hud-save"    title="存檔">■</button>
          <button class="hud-btn" id="hud-history" title="歷史">≡</button>
          <button class="hud-btn" id="hud-auto"    title="自動">▶</button>
          <button class="hud-btn" id="hud-skip"    title="略過全部 (» 按鈕) — 或長按 Ctrl 快進對話">»</button>
        </div>
      </div>
    </div>

    <!-- ── 存讀檔 Overlay ── -->
    <div id="overlay-saveload" class="overlay hidden">
      <div class="overlay-panel">
        <h2 id="overlay-title">存/讀檔</h2>
        <div id="save-slots"></div>
        <button class="menu-btn" id="overlay-close">關閉</button>
      </div>
    </div>

    <!-- ── 歷史記錄 Overlay ── -->
    <div id="overlay-history" class="overlay hidden">
      <div class="overlay-panel" id="history-panel">
        <h2>對話記錄</h2>
        <div id="history-list"></div>
        <button class="menu-btn" id="history-close">關閉</button>
      </div>
    </div>

  </div><!-- #vn-root -->

  <script type="module" src="js/main.js"></script>
  <script>
  // ── Film grain canvas ─────────────────────────────────────────────
  (function() {
    const canvas = document.getElementById('grain-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, frame = 0;

    function resize() {
      W = canvas.width  = canvas.offsetWidth  || window.innerWidth;
      H = canvas.height = canvas.offsetHeight || window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function drawGrain() {
      // Only redraw at ~12fps — enough for film grain feel
      frame++;
      if (frame % 5 !== 0) { requestAnimationFrame(drawGrain); return; }

      const imgData = ctx.createImageData(W, H);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = (Math.random() * 2 - 1) * 38;
        d[i]   = 128 + v;
        d[i+1] = 128 + v;
        d[i+2] = 118 + v;  // slight warm tint
        d[i+3] = Math.random() < 0.06 ? 18 : (Math.random() < 0.015 ? 38 : 8);
      }
      ctx.putImageData(imgData, 0, 0);
      requestAnimationFrame(drawGrain);
    }
    drawGrain();
  })();

  // ── Menu water-ripple canvas ──────────────────────────────────────
  (function() {
    const canvas = document.getElementById('menu-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;
    const LINES = 18;

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (let i = 0; i < LINES; i++) {
        const y = (H * 0.55) + Math.sin(t * 0.4 + i * 0.6) * (H * 0.08)
                  + (i / LINES) * (H * 0.5);
        const alpha = (1 - i / LINES) * 0.12;
        const hue   = i % 3 === 0 ? '140,96,22' : '192,120,32';  // all warm amber, no teal
        ctx.beginPath();
        ctx.moveTo(0, y);
        for (let x = 0; x < W; x += 8) {
          const dy = Math.sin(t * 0.5 + x * 0.012 + i * 0.8) * 6
                   + Math.cos(t * 0.3 + x * 0.007) * 3;
          ctx.lineTo(x, y + dy);
        }
        ctx.strokeStyle = `rgba(${hue},${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      t += 0.018;
      // Only animate while menu is visible
      if (document.getElementById('main-menu').classList.contains('active')) {
        requestAnimationFrame(draw);
      }
    }
    // Start when menu shown
    const obs = new MutationObserver(() => {
      if (document.getElementById('main-menu').classList.contains('active')) draw();
    });
    obs.observe(document.getElementById('main-menu'), { attributes: true, attributeFilter: ['class'] });
    draw();
  })();
  </script>
</body>
</html>
