<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>暗渠之書 ⌘ Dev Dashboard</title>
<style>
/* ── Reset & Variables ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Aged monochrome palette */
  --bg:      #080704;
  --panel:   #0e0c09;
  --panel2:  #130f0b;
  --border:  #221c14;
  --border2: #342a1e;
  --text:    #b8aa8a;
  --dim:     #4a4030;
  --muted:   #6a5a40;
  --amber:   #a86810;
  --amberB:  #c88020;
  --teal:    #3a6858;
  --green:   #3a6840;
  --red:     #883020;
  --blue:    #385870;
  --info:    #485860;
  --scrollbar: #1e180e;
  /* Aged paper texture colours */
  --paper:   rgba(190,160,90,0.04);
  --ink:     rgba(30,22,10,0.85);
}
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Consolas', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 12.5px; line-height: 1.5; overflow: hidden;
  /* Aged paper grain on entire dashboard */
  background-image:
    repeating-linear-gradient(
      0deg, transparent 0px, transparent 3px,
      rgba(180,150,80,0.018) 3px, rgba(180,150,80,0.018) 4px
    ),
    repeating-linear-gradient(
      90deg, transparent 0px, transparent 60px,
      rgba(20,14,6,0.06) 60px, rgba(20,14,6,0.06) 61px
    );
  filter: sepia(0.12) contrast(1.04);
}
::-webkit-scrollbar        { width: 6px; height: 6px; }
::-webkit-scrollbar-track  { background: var(--bg); }
::-webkit-scrollbar-thumb  { background: var(--scrollbar); border-radius: 0; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }

/* ── Top Bar ───────────────────────────────────────────────────── */
#topbar {
  height: 38px;
  background:
    linear-gradient(90deg,
      rgba(30,20,8,0.95) 0%,
      rgba(18,12,5,0.98) 50%,
      rgba(30,20,8,0.95) 100%);
  border-bottom: 1px solid rgba(168,104,16,0.7);
  box-shadow: 0 1px 8px rgba(0,0,0,0.6), inset 0 -1px 0 rgba(168,104,16,0.15);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px; flex-shrink: 0; position: relative; z-index: 10;
}
#topbar::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      90deg, transparent 0px, transparent 120px,
      rgba(168,104,16,0.02) 120px, rgba(168,104,16,0.02) 121px
    );
  pointer-events: none;
}
#title { font-size: 13px; color: var(--amberB); letter-spacing: 0.06em; }
#title .dim { color: var(--muted); font-size: 11.5px; }
#topbar .actions { display: flex; align-items: center; gap: 10px; }
.dot { font-size: 10px; }
.dot.ok  { color: var(--green); text-shadow: 0 0 6px var(--green); }
.dot.err { color: var(--red); text-shadow: 0 0 6px var(--red); }
.btn {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(168,104,16,0.08) 0%, transparent 70%),
    var(--panel2);
  border: 1px solid var(--border2); color: var(--text);
  padding: 3px 10px; font-size: 11.5px; font-family: inherit; cursor: pointer;
  border-radius: 0; text-decoration: none; display: inline-block;
  transition: border-color .15s, color .15s, background .15s;
}
.btn:hover { border-color: rgba(168,104,16,0.6); color: var(--amberB); }
.btn.primary { border-color: rgba(168,104,16,0.6); color: var(--amberB); }

/* ── Main Layout ───────────────────────────────────────────────── */
#layout {
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  height: calc(100vh - 38px);
  overflow: hidden;
}

/* ── Panels ────────────────────────────────────────────────────── */
.panel {
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column;
  background:
    repeating-linear-gradient(
      135deg, transparent 0px, transparent 22px,
      rgba(168,104,16,0.008) 22px, rgba(168,104,16,0.008) 24px
    );
}
.panel-hd {
  font-size: 9.5px; letter-spacing: .14em; color: var(--amber);
  padding: 5px 10px 4px;
  border-bottom: 1px solid rgba(168,104,16,0.28);
  background:
    linear-gradient(90deg, rgba(168,104,16,0.06) 0%, transparent 60%);
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  text-transform: uppercase;
}
.panel-hd::before {
  content: '▐';
  font-size: 8px;
  color: var(--amber);
  opacity: 0.55;
}
.panel-body {
  overflow-y: auto; padding: 0; flex: 1;
}

/* ── Left Sidebar ──────────────────────────────────────────────── */
#sidebar-left {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#sidebar-left .panel { flex-shrink: 0; }
#panel-scripts { flex: 0 0 auto; }
#panel-validate { flex: 0 1 auto; max-height: 220px; }
#panel-git { flex: 1 1 0; min-height: 80px; }

/* Script list */
.script-item {
  padding: 5px 10px; cursor: pointer; border-left: 2px solid transparent;
  display: flex; flex-direction: column; gap: 2px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.script-item:hover   { background: var(--panel2); }
.script-item.active  { border-left-color: var(--amber); background: var(--panel2); }
.script-name { color: var(--amberB); font-size: 12px; }
.script-meta { color: var(--muted); font-size: 10.5px; display: flex; gap: 8px; }
.script-meta span { white-space: nowrap; }

/* Validate list */
.issue-item {
  padding: 4px 10px; border-bottom: 1px solid var(--border);
  display: flex; gap: 6px; align-items: flex-start;
  font-size: 11px;
}
.issue-icon { flex-shrink: 0; font-size: 10px; margin-top: 1px; }
.issue-icon.error   { color: var(--red); }
.issue-icon.warning { color: var(--amber); }
.issue-icon.info    { color: var(--info); }
.issue-body { flex: 1; min-width: 0; }
.issue-loc  { color: var(--muted); font-size: 10px; }
.issue-msg  { color: var(--text); white-space: normal; word-break: break-word; }

/* Git log */
.git-item {
  padding: 4px 10px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 1px;
}
.git-hash { color: var(--teal); font-size: 10.5px; }
.git-msg  { color: var(--text); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.git-date { color: var(--muted); font-size: 10px; }

/* ── Center: Script Viewer ─────────────────────────────────────── */
#content {
  display: flex; flex-direction: column; overflow: hidden;
  border-right: 1px solid var(--border);
}
#script-topbar {
  height: 32px; background: var(--panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; flex-shrink: 0;
}
#current-file { color: var(--muted); font-size: 11.5px; }
#cmd-stats {
  display: flex; gap: 10px; font-size: 10.5px;
}
.stat { color: var(--muted); }
.stat b { color: var(--text); font-weight: normal; }
#script-viewer {
  flex: 1; overflow-y: auto; padding: 6px 0;
}
#script-hint {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--dim); font-size: 13px;
}

/* VNS line coloring */
.vline {
  display: flex; align-items: flex-start; gap: 0; min-height: 19px;
  padding: 0 4px;
}
.vline:hover { background: rgba(255,255,255,.03); }
.vline.has-error   { background: rgba(176,48,48,.08); }
.vline.has-warning { background: rgba(192,120,32,.06); }
.vline.has-info    { background: rgba(96,120,152,.06); }
.ln {
  min-width: 38px; text-align: right; padding-right: 8px;
  color: var(--dim); user-select: none; flex-shrink: 0; font-size: 11px;
  padding-top: 1px;
}
.lc { flex: 1; min-width: 0; padding-right: 6px; font-size: 12px; word-break: break-word; }
.jump-btn {
  flex-shrink: 0; padding: 0 5px; color: var(--border2); font-size: 10px;
  text-decoration: none; align-self: center;
  transition: color .1s;
}
.jump-btn:hover { color: var(--amberB); }

/* VNS syntax tokens */
.t-cmd    { color: var(--amber); }
.t-key    { color: var(--teal); }
.t-val    { color: var(--green); }
.t-char   { color: #70b0c8; }
.t-dial   { color: #e0d4c0; }
.t-narr   { color: var(--text); }
.t-emph   { color: #c8a850; font-style: italic; }
.t-cmt    { color: var(--dim); }
.t-blank  {}
.t-issue  { color: var(--red); font-size: 10px; }

/* ── Right Sidebar ─────────────────────────────────────────────── */
#sidebar-right {
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-right .panel { flex-shrink: 0; }
#panel-bgs    { flex: 0 0 auto; max-height: 190px; }
#panel-chars  { flex: 0 1 auto; max-height: 170px; }
#panel-audio  { flex: 1 1 0; min-height: 50px; }
#panel-style  { flex: 0 0 auto; }
#panel-tools  { flex: 0 0 auto; }

/* Background grid */
#bg-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; padding: 8px;
  overflow-y: auto;
}
.bg-thumb {
  position: relative; aspect-ratio: 16/9; overflow: hidden;
  border: 1px solid var(--border); border-radius: 2px; cursor: pointer;
  transition: border-color .15s;
}
.bg-thumb:hover { border-color: var(--amber); }
.bg-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  background: var(--panel2);
}
.bg-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(6,6,15,.8); color: var(--muted);
  font-size: 9.5px; padding: 2px 4px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.bg-status {
  position: absolute; top: 3px; right: 3px;
  font-size: 9px; padding: 1px 4px; border-radius: 2px;
}
.s-ready      { background: rgba(80,136,104,.5); color: #90d0b0; }
.s-procedural { background: rgba(80,80,128,.5);  color: #9090d0; }
.s-missing    { background: rgba(176,48,48,.5);  color: #e07070; }

/* Character grid */
#char-grid { overflow-y: auto; padding: 6px; }
.char-section { margin-bottom: 6px; }
.char-name {
  font-size: 10px; color: var(--amber); padding: 3px 4px; margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
}
.char-src {
  font-size: 8px; padding: 0 4px; border-radius: 2px;
  background: rgba(80,136,152,.3); color: var(--teal);
  border: 1px solid rgba(80,136,152,.25);
}
.expr-row { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 4px; }
.expr-thumb {
  position: relative; width: 44px; cursor: pointer;
  border: 1px solid var(--border); border-radius: 2px; overflow: hidden;
  transition: border-color .15s;
}
.expr-thumb:hover { border-color: var(--teal); }
.expr-thumb img { width: 100%; display: block; background: var(--panel2); }
.expr-name {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(6,6,15,.85); color: var(--muted);
  font-size: 8px; padding: 1px 2px; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Audio list */
#audio-list { overflow-y: auto; }
.audio-section-hd {
  font-size: 10px; color: var(--muted); padding: 4px 10px 2px;
  border-bottom: 1px solid var(--border);
}
.audio-item {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.audio-icon { font-size: 10px; width: 14px; text-align: center; flex-shrink: 0; }
.audio-icon.ok   { color: var(--green); }
.audio-icon.proc { color: var(--blue); }
.audio-icon.miss { color: var(--red); }
.audio-id   { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.audio-desc { color: var(--muted); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

/* ── Lightbox ──────────────────────────────────────────────────── */
#lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88);
  z-index: 100; align-items: center; justify-content: center; flex-direction: column;
  gap: 10px; cursor: pointer;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 85vh; border: 1px solid var(--border2); }
#lightbox-caption { color: var(--muted); font-size: 11px; }

/* ── Misc ───────────────────────────────────────────────────────── */
.empty { color: var(--dim); font-size: 11px; padding: 8px 10px; }
.badge {
  font-size: 9px; padding: 0 5px; border-radius: 10px; margin-left: 2px;
  background: var(--border); color: var(--muted);
}
.badge.red { background: rgba(176,48,48,.3); color: #e07070; }

/* ── Tools Panel ───────────────────────────────────────────────── */
#panel-tools { flex: 0 0 auto; }
.tools-section { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.tools-section-hd {
  font-size: 9.5px; color: var(--muted); margin-bottom: 5px;
  letter-spacing: .08em; text-transform: uppercase;
}
.tools-row { display: flex; flex-wrap: wrap; gap: 4px; }
.tool-btn {
  background: var(--panel2); border: 1px solid var(--border2);
  color: var(--text); padding: 3px 9px; font-size: 10.5px;
  font-family: inherit; cursor: pointer; border-radius: 2px;
  transition: border-color .12s, color .12s, background .12s;
  display: inline-flex; align-items: center; gap: 4px;
}
.tool-btn:hover { border-color: var(--amber); color: var(--amberB); }
.tool-btn.running { border-color: var(--blue); color: var(--blue); }
.tool-btn.ok      { border-color: var(--green); color: var(--green); }
.tool-btn.err     { border-color: var(--red); color: var(--red); }
.tool-btn.active-toggle { border-color: var(--teal); color: var(--teal); background: rgba(80,136,152,.12); }
#tool-log {
  font-size: 9.5px; color: var(--muted); padding: 4px 8px;
  white-space: pre-wrap; word-break: break-all; max-height: 60px;
  overflow-y: auto; background: var(--bg); border-top: 1px solid var(--border);
}

/* ── Style Panel ──────────────────────────────────────────────── */
#panel-style { flex: 0 0 auto; }
.style-grid {
  display: grid;
  grid-template-columns: 1fr minmax(50px,70px) 30px;
  gap: 3px 5px;
  align-items: center;
  padding: 4px 8px 2px;
}
.style-grid label { font-size: 10px; color: var(--muted); white-space: nowrap; }
.style-grid input[type=range] {
  width: 100%; height: 3px; accent-color: var(--amber);
  cursor: pointer; padding: 0;
}
.style-grid .sv { font-size: 9.5px; color: var(--text); text-align: right; }
.style-preview-row {
  display: flex; gap: 4px; padding: 5px 8px 6px; flex-wrap: wrap;
}

/* ── Panel header mini button（⊕ 匯入等） ───────────────────────── */
.hd-btn {
  margin-left: auto; background: none; border: 1px solid var(--border2);
  color: var(--muted); font-size: 9.5px; padding: 1px 7px; cursor: pointer;
  font-family: inherit; letter-spacing: .05em;
  transition: border-color .12s, color .12s;
}
.hd-btn:hover { border-color: var(--amber); color: var(--amberB); }

/* ── Script editor（中央檢視器的編輯模式：HackMD 式雙欄） ────────── */
#editor-split {
  display: none; flex: 1; min-height: 0;
  grid-template-columns: 1fr 1fr;
}
#content.editing #editor-split { display: grid; }
#content.editing #script-viewer { display: none; }
#content.editing.no-preview #editor-split { grid-template-columns: 1fr; }
#content.editing.no-preview #preview-pane { display: none; }
#content.editing #script-topbar { border-bottom-color: rgba(168,104,16,0.6); }
.dirty-star { color: var(--amberB); }

#script-editor {
  width: 100%; min-width: 0; min-height: 0;
  background: var(--bg); color: var(--text);
  border: none; outline: none; resize: none;
  padding: 8px 12px; font-family: inherit; font-size: 12.5px;
  line-height: 1.7; tab-size: 2; white-space: pre; overflow: auto;
}

#preview-pane {
  min-width: 0; min-height: 0;
  display: flex; flex-direction: column;
  border-left: 1px solid var(--border2);
  background: #000;
}
#preview-frame {
  flex: 1; width: 100%; border: none; background: #000; min-height: 0;
}
#preview-hint {
  font-size: 9.5px; color: var(--muted); padding: 3px 8px;
  border-top: 1px solid var(--border); flex-shrink: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── 匯入 Modal ─────────────────────────────────────────────────── */
#modal-import {
  position: fixed; inset: 0; display: none; z-index: 120;
  background: rgba(0,0,0,.72); align-items: center; justify-content: center;
}
#modal-import.open { display: flex; }
.modal-panel {
  background: var(--panel); border: 1px solid var(--border2);
  border-top: 2px solid var(--amber);
  padding: 16px 18px; width: min(440px, 92vw);
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 8px 40px rgba(0,0,0,.8);
}
.modal-panel h3 { font-size: 11px; color: var(--amberB); letter-spacing: .12em; }
.modal-panel label { font-size: 10.5px; color: var(--muted); }
.modal-panel input[type=text] {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text);
  padding: 6px 8px; font-family: inherit; font-size: 12px; width: 100%;
}
#import-file-list { font-size: 11px; max-height: 150px; overflow-y: auto; }
#import-file-list .imp-f { padding: 3px 0; border-bottom: 1px solid var(--border); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Toast ──────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--panel2); border: 1px solid var(--amber); color: var(--text);
  padding: 8px 18px; font-size: 12px; z-index: 130; max-width: 90vw;
  opacity: 0; pointer-events: none; transition: opacity .25s;
  box-shadow: 0 4px 20px rgba(0,0,0,.7);
}
#toast.show { opacity: 1; }

/* ══ RESPONSIVE — 平板 / 手機自適應 ═══════════════════════════════ */

/* ── 平板（769–1100px）：右側 assets 欄移到底部橫排 ── */
@media (max-width: 1100px) and (min-width: 769px) {
  #layout {
    grid-template-columns: 200px 1fr;
    grid-template-rows: 1fr minmax(170px, 28vh);
  }
  #sidebar-left { grid-row: 1 / -1; }
  #content      { grid-column: 2; grid-row: 1; }
  #sidebar-right {
    grid-column: 2; grid-row: 2;
    flex-direction: row;
    border-top: 1px solid var(--border2);
    overflow-x: auto; overflow-y: hidden;
  }
  #sidebar-right .panel {
    flex: 1 0 220px;
    max-height: none !important;
    border-bottom: none;
    border-right: 1px solid var(--border);
  }
  #panel-bgs, #panel-chars, #panel-audio,
  #panel-style, #panel-tools { flex: 1 0 230px; min-height: 0; }
}

/* ── 窄幅（≤1280px）：編輯雙欄改上下疊（編輯上、預覽下） ── */
@media (max-width: 1280px) {
  #content.editing #editor-split {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr minmax(180px, 42%);
  }
  #preview-pane { border-left: none; border-top: 1px solid var(--border2); }
}

/* ── 手機（≤768px）：單欄堆疊、解除整頁 overflow 鎖定 ── */
@media (max-width: 768px) {
  html, body { overflow: auto; height: auto; min-height: 100%; }

  #topbar {
    position: sticky; top: 0; z-index: 50;
    height: auto; min-height: 38px;
    flex-wrap: wrap; gap: 4px; padding: 6px 10px;
    padding-top: calc(6px + env(safe-area-inset-top, 0px));
  }
  #topbar .actions { flex-wrap: wrap; }
  .btn { padding: 6px 12px; }       /* 觸控目標加大 */

  #layout {
    display: flex; flex-direction: column;
    height: auto; overflow: visible;
  }

  #sidebar-left, #content, #sidebar-right {
    display: flex; flex-direction: column;
    border-right: none; overflow: visible;
    width: 100%;
  }

  /* 每個 panel 給上限高度、內部自捲，頁面整體下捲瀏覽 */
  .panel { max-height: 40vh !important; flex: 0 0 auto !important; }
  .panel-body { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #panel-validate, #panel-git { max-height: 28vh !important; }

  /* 腳本檢視器固定高度（單欄裡的「主畫面」），#content 本身不設上限 */
  #content { border-right: none; max-height: none !important; }
  #script-viewer { max-height: 55vh; }
  /* 編輯模式：編輯區 40vh + 預覽 40vh 上下疊 */
  #content.editing #editor-split {
    grid-template-rows: 40vh 40vh;
  }

  /* 點按目標加大 */
  .script-item { padding: 9px 12px; }
  .tool-btn { padding: 7px 12px; font-size: 11.5px; }
  .expr-thumb { width: 56px; }
  #bg-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }

  /* 觸控回饋 */
  .script-item:active, .tool-btn:active, .btn:active {
    background: rgba(168,104,16,0.14);
  }

<script>
// ── State ─────────────────────────────────────────────────────────
const S = {
  scripts:   [],
  manifest:  {},
  assetMap:  {},
  issues:    [],
  gitLog:    [],
  activeFile: null,
  content:   null,
};

// ── Fetch helpers ──────────────────────────────────────────────────
async function api(path) {
  try {
    const r = await fetch(path);
    if (!r.ok) throw new Error(r.status);
    return r.json();
  } catch (e) {
    console.error('API error', path, e);
    return null;
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────
async function refreshAll() {
  document.getElementById('dot').className = 'dot';
  document.getElementById('dot').title = '載入中…';

  const [scripts, manifest, assetMap, issues, gitLog] = await Promise.all([
    api('/api/scripts'),
    api('/api/manifest'),
    api('/api/assets/check'),
    api('/api/validate'),
    api('/api/git/log'),
  ]);

  if (scripts)   S.scripts  = scripts;
  if (manifest)  S.manifest = manifest;
  if (assetMap)  S.assetMap = assetMap;
  if (issues)    S.issues   = issues;
  if (gitLog)    S.gitLog   = gitLog;

  document.getElementById('dot').className = 'dot ok';
  document.getElementById('dot').title = 'Server OK';

  renderScripts();
  renderValidate();
  renderGit();
  renderBackgrounds();
  renderCharacters();
  renderAudio();

  // Re-render open file if any（await 避免與後續 loadScript 競態）
  if (S.activeFile) await loadScript(S.activeFile);
}

// ── Scripts List ──────────────────────────────────────────────────
function renderScripts() {
  const el = document.getElementById('scripts-list');
  const badge = document.getElementById('script-count');
  badge.textContent = S.scripts.length;
  if (!S.scripts.length) { el.innerHTML = '<div class="empty">無 .vns 檔案</div>'; return; }

  el.innerHTML = S.scripts.map(s => {
    const active = S.activeFile === s.path ? ' active' : '';
    const total = s.cmds ? Object.values(s.cmds).reduce((a,b)=>a+b,0) : '?';
    const est   = s.est_min ? `~${s.est_min}min` : '';
    return `<div class="script-item${active}" onclick="loadScript('${esc(s.path)}')">
      <span class="script-name">${esc(s.name)}.vns</span>
      <span class="script-meta">
        <span>${s.lines} 行</span>
        <span>${total} 指令</span>
        <span>${est}</span>
      </span>
    </div>`;
  }).join('');
}

// ── Load & Render Script ──────────────────────────────────────────
async function loadScript(path) {
  // 編輯模式下切換檔案：未儲存變更要先確認
  if (_editing) {
    if (_dirty && !confirm('有未儲存的變更，捨棄並切換？')) return;
    _exitEditUI();
  }
  S.activeFile = path;
  renderScripts(); // update active state
  document.getElementById('btn-edit').style.display = '';

  document.getElementById('current-file').textContent = path;
  document.getElementById('script-viewer').innerHTML = '<div class="empty">載入中…</div>';

  const data = await api(`/api/scripts/content?f=${encodeURIComponent(path)}`);
  if (!data) {
    document.getElementById('script-viewer').innerHTML = '<div class="empty" style="color:var(--red)">無法讀取</div>';
    return;
  }
  S.content = data.content;

  // Stats for this file
  const meta = S.scripts.find(s => s.path === path);
  if (meta && meta.cmds) {
    const c = meta.cmds;
    document.getElementById('cmd-stats').innerHTML = [
      `<span class="stat">對話 <b>${c.dialogue}</b></span>`,
      `<span class="stat">旁白 <b>${c.narration}</b></span>`,
      `<span class="stat">場景 <b>${c.scene}</b></span>`,
      `<span class="stat">選擇 <b>${c.choice}</b></span>`,
      meta.est_min ? `<span class="stat">~<b>${meta.est_min}</b>min</span>` : '',
    ].join('');
  }

  // Render colorized lines
  const fileIssues = S.issues.filter(i => i.file === path);
  const issueMap = {};
  fileIssues.forEach(i => {
    if (!issueMap[i.line]) issueMap[i.line] = [];
    issueMap[i.line].push(i);
  });

  const lines = data.content.split('\n');
  const html = lines.map((raw, idx) => {
    const lineNum = idx + 1;
    const lineIssues = issueMap[lineNum] || [];
    const issueCls = lineIssues.length
      ? ` has-${lineIssues[0].type}` : '';

    const issueTitle = lineIssues.map(i => i.msg).join(' | ');
    const issueHtml  = lineIssues.length
      ? `<span class="t-issue" title="${esc(issueTitle)}">${lineIssues[0].type === 'error' ? '✗' : lineIssues[0].type === 'warning' ? '⚠' : 'ℹ'}</span>` : '';

    const content = colorizeVNS(raw);
    // Jump button for @scene lines
    let jumpBtn = '';
    const sceneM = raw.match(/^\s*@scene\b[^=]*bg=(\S+)/);
    if (sceneM) {
      const sceneId = sceneM[1];
      jumpBtn = `<a class="jump-btn" href="/engine/?devScene=${esc(sceneId)}" target="_blank" title="跳至此場景測試">▶</a>`;
    }

    return `<div class="vline${issueCls}">
      <span class="ln">${lineNum}</span>
      <span class="lc">${issueHtml}${content}</span>
      ${jumpBtn}
    </div>`;
  }).join('');

  document.getElementById('script-viewer').innerHTML = html;
}

// ── VNS Syntax Colorizer ──────────────────────────────────────────
function colorizeVNS(raw) {
  const line = raw.trimEnd();
  if (!line.trim()) return '&nbsp;';

  const s = line.trimStart();
  const indent = line.length - line.trimStart().length;
  const pad = indent ? `<span style="opacity:0">${' '.repeat(indent)}</span>` : '';

  if (s.startsWith('#')) {
    return pad + `<span class="t-cmt">${esc(line.trim())}</span>`;
  }

  if (s.startsWith('@')) {
    // Command line: @cmd key=val key=val
    // 注意：必須先 tokenize 再注入 HTML——若先包 <span class="t-cmd"> 再跑
    // key=val regex，regex 會把注入的 class="t-cmd" 也當參數改寫，輸出破碎 HTML
    const m = s.match(/^(@\w+)([\s\S]*)$/);
    if (!m) return pad + esc(s);
    const rest = m[2];
    let html = `<span class="t-cmd">${esc(m[1])}</span>`;
    let last = 0;
    const kvRe = /(\w+)=("[^"]*"|\S+)/g;
    let mm;
    while ((mm = kvRe.exec(rest)) !== null) {
      html += esc(rest.slice(last, mm.index));
      html += `<span class="t-key">${esc(mm[1])}</span>=<span class="t-val">${esc(mm[2])}</span>`;
      last = mm.index + mm[0].length;
    }
    html += esc(rest.slice(last));
    return pad + html;
  }

  if (s.startsWith('[')) {
    // [char_id] dialogue text
    return pad + s.replace(/^\[([^\]]+)\](.*)/, (m, cid, text) =>
      `<span class="t-char">[${esc(cid)}]</span><span class="t-dial">${esc(text)}</span>`
    );
  }

  if (s.startsWith('>')) {
    return pad + `<span class="t-emph">${esc(s)}</span>`;
  }

  return pad + `<span class="t-narr">${esc(s)}</span>`;
}

// ── Validate ──────────────────────────────────────────────────────
function renderValidate() {
  const el    = document.getElementById('validate-list');
  const badge = document.getElementById('issue-badge');
  const errors = S.issues.filter(i => i.type === 'error');

  badge.textContent = S.issues.length;
  if (errors.length) badge.className = 'badge red';

  if (!S.issues.length) {
    el.innerHTML = '<div class="empty" style="color:var(--green)">✓ 無問題</div>';
    return;
  }

  el.innerHTML = S.issues.map(i => {
    const iconClass = i.type === 'error' ? 'error' : i.type === 'warning' ? 'warning' : 'info';
    const icon = i.type === 'error' ? '✗' : i.type === 'warning' ? '⚠' : 'ℹ';
    const fileBase = i.file.split('/').pop();
    const loc = i.line > 0 ? `${fileBase}:${i.line}` : fileBase;
    return `<div class="issue-item">
      <span class="issue-icon ${iconClass}">${icon}</span>
      <div class="issue-body">
        <div class="issue-loc">${esc(loc)}</div>
        <div class="issue-msg">${esc(i.msg)}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Git Log ───────────────────────────────────────────────────────
function renderGit() {
  const el = document.getElementById('git-list');
  if (!S.gitLog.length) { el.innerHTML = '<div class="empty">無記錄</div>'; return; }
  el.innerHTML = S.gitLog.map(c =>
    `<div class="git-item">
      <div style="display:flex;gap:8px;align-items:center">
        <span class="git-hash">${esc(c.hash)}</span>
        <span class="git-date">${esc(c.date)}</span>
      </div>
      <span class="git-msg" title="${esc(c.msg)}">${esc(c.msg)}</span>
    </div>`
  ).join('');
}

// ── Backgrounds ───────────────────────────────────────────────────
function bgImgSrc(id, info) {
  // Prefer PNG > SVG, derive from manifest file path
  const file = info.file || `backgrounds/${id}.svg`;
  const isPng = file.endsWith('.png');
  if (isPng && S.assetMap[`backgrounds/${id}.png`]) return `/assets/backgrounds/${id}.png`;
  if (S.assetMap[`backgrounds/${id}.svg`]) return `/assets/backgrounds/${id}.svg`;
  return '';
}

function bgLightboxSrc(id, info) {
  const file = info.file || '';
  if (file.endsWith('.png') && S.assetMap[`backgrounds/${id}.png`]) return `/assets/backgrounds/${id}.png`;
  return `/assets/backgrounds/${id}.svg`;
}

function renderBackgrounds() {
  const el = document.getElementById('bg-grid');
  const bgs = S.manifest.backgrounds || {};
  const ids = Object.keys(bgs);
  if (!ids.length) { el.innerHTML = '<div class="empty">無背景</div>'; return; }

  el.innerHTML = ids.map(id => {
    const info   = bgs[id];
    const imgSrc = bgImgSrc(id, info);
    const lbSrc  = bgLightboxSrc(id, info);
    const status = imgSrc ? 'ready' : (info.status || 'missing');
    const badgeCls = status === 'ready' ? 's-ready' : (status === 'procedural' ? 's-procedural' : 's-missing');
    const badgeTxt = status === 'ready' ? '✓' : (status === 'procedural' ? '⚡' : '✗');
    const imgHtml  = imgSrc
      ? `<img src="${imgSrc}" alt="${esc(id)}" loading="lazy">`
      : `<div style="height:100%;background:var(--panel2);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:10px">no img</div>`;

    return `<div class="bg-thumb" onclick="openLightbox('${esc(lbSrc)}','${esc(id)}')" title="${esc(info.description || id)}">
      ${imgHtml}
      <span class="bg-label">${esc(id)}</span>
      <span class="bg-status ${badgeCls}">${badgeTxt}</span>
    </div>`;
  }).join('');
}

// ── Characters ────────────────────────────────────────────────────
function charImgSrc(cid, expr, info) {
  const file = info?.file || `characters/${cid}/${expr}.svg`;
  const isPng = file.endsWith('.png');
  if (isPng && S.assetMap[`characters/${cid}/${expr}.png`]) return `/assets/characters/${cid}/${expr}.png`;
  if (S.assetMap[`characters/${cid}/${expr}.svg`]) return `/assets/characters/${cid}/${expr}.svg`;
  return '';
}

function renderCharacters() {
  const el   = document.getElementById('char-grid');
  const chars = S.manifest.characters || {};
  const cids  = Object.keys(chars);
  if (!cids.length) { el.innerHTML = '<div class="empty">無角色</div>'; return; }

  el.innerHTML = cids.map(cid => {
    const info  = chars[cid];
    const exprs = Object.entries(info.expressions || {});
    const exprHtml = exprs.map(([expr, exprInfo]) => {
      const imgSrc = charImgSrc(cid, expr, exprInfo);
      const lbSrc  = imgSrc || `/assets/characters/${cid}/${expr}.svg`;
      return `<div class="expr-thumb" onclick="openLightbox('${esc(lbSrc)}','${esc(cid)}/${esc(expr)}')" title="${esc(expr)}">
        ${imgSrc
          ? `<img src="${imgSrc}" alt="${esc(expr)}" loading="lazy" style="object-fit:contain;background:#0a0a14;">`
          : `<div style="height:80px;background:var(--panel2);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:9px">?</div>`}
        <span class="expr-name">${esc(expr)}</span>
      </div>`;
    }).join('');
    const srcBadge = info.source_model
      ? `<span class="char-src" title="${esc(info.source_model)}">vrm</span>` : '';
    return `<div class="char-section">
      <div class="char-name">${esc(cid)} ${srcBadge}</div>
      <div class="expr-row">${exprHtml}</div>
    </div>`;
  }).join('');
}

// ── Audio ─────────────────────────────────────────────────────────
function renderAudio() {
  const el    = document.getElementById('audio-list');
  const audio = S.manifest.audio || {};
  const bgms  = Object.entries(audio.bgm  || {});
  const sfxs  = Object.entries(audio.sfx  || {});

  if (!bgms.length && !sfxs.length) { el.innerHTML = '<div class="empty">無音訊定義</div>'; return; }

  const renderRow = ([id, info]) => {
    const exists = S.assetMap[info.file?.replace(/^[^/]+\//, '')];
    const status = info.status || (exists ? 'ready' : 'missing');
    const icon    = status === 'ready' ? '✓' : (status === 'procedural' ? '⚡' : '✗');
    const icoCls  = status === 'ready' ? 'ok' : (status === 'procedural' ? 'proc' : 'miss');
    return `<div class="audio-item">
      <span class="audio-icon ${icoCls}">${icon}</span>
      <span class="audio-id">${esc(id)}</span>
      <span class="audio-desc" title="${esc(info.description||'')}">${esc(info.description||'')}</span>
    </div>`;
  };

  el.innerHTML =
    (bgms.length ? `<div class="audio-section-hd">BGM</div>${bgms.map(renderRow).join('')}` : '') +
    (sfxs.length ? `<div class="audio-section-hd">SFX</div>${sfxs.map(renderRow).join('')}` : '');
}

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(src, caption) {
  if (!src || src.includes('undefined')) return;
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox-caption').textContent = caption;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Utils ─────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── 下載 dist 部署包（server 重打包 → blob 下載） ──────────────────
async function downloadDist() {
  const btn = document.getElementById('btn-dist');
  if (btn.disabled) return;
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⏳ 打包中…';
  try {
    const r = await fetch('/api/dist/download');
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.error || `HTTP ${r.status}`);
    }
    const blob = await r.blob();
    const cd = r.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename="([^"]+)"/);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = m ? m[1] : 'vn-demo.zip';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
    toast(`✓ dist 打包完成，開始下載（${(blob.size / 1024 / 1024).toFixed(1)} MB）`);
  } catch (e) {
    toast('✗ 打包失敗: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = orig;
}

// ── 匯入劇本（file selector → modal → POST upload） ───────────────
let _importFiles = [];

function pickImport() { document.getElementById('import-input').click(); }

function onImportFiles(input) {
  if (!input.files.length) return;
  _importFiles = [...input.files];
  document.getElementById('import-file-list').innerHTML = _importFiles.map(f =>
    `<div class="imp-f">${esc(f.name)} <span style="color:var(--muted)">(${(f.size / 1024).toFixed(1)} KB)</span></div>`
  ).join('');
  // 既有故事目錄做 datalist 提示
  const stories = [...new Set(S.scripts.map(s => s.path.split('/')[1]).filter(Boolean))];
  document.getElementById('story-options').innerHTML =
    stories.map(s => `<option value="${esc(s)}">`).join('');
  const inp = document.getElementById('import-story');
  if (!inp.value.trim()) inp.value = stories[0] || 'my-story';
  document.getElementById('modal-import').classList.add('open');
  input.value = '';  // 允許重選同一批檔案
}

function closeImport() {
  document.getElementById('modal-import').classList.remove('open');
  _importFiles = [];
}

async function confirmImport() {
  const story = document.getElementById('import-story').value.trim();
  if (!story) { toast('✗ 請輸入故事目錄名稱'); return; }
  if (!_importFiles.length) { closeImport(); return; }
  let files;
  try {
    files = await Promise.all(_importFiles.map(f =>
      f.text().then(content => ({ name: f.name, content }))));
  } catch (e) { toast('✗ 讀檔失敗: ' + e.message); return; }
  try {
    const r = await fetch('/api/scripts/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ story, files }),
    });
    const data = await r.json();
    closeImport();
    if (data.ok) {
      const skipMsg = data.skipped?.length
        ? `（略過 ${data.skipped.length}：${data.skipped.map(s => s.name).join(', ')}）` : '';
      toast(`✓ 已匯入 ${data.saved.length} 個檔案到 scripts/${data.story}/ ${skipMsg}`);
      await refreshAll();
      if (data.saved.length) await loadScript(data.saved[0].path);
    } else {
      toast(`✗ 匯入失敗: ${data.error || JSON.stringify(data.skipped)}`);
    }
  } catch (e) { toast('✗ 上傳失敗: ' + e.message); }
}

// ── 編輯模式（中央 viewer ⇄ 雙欄編輯+即時預覽，Ctrl+S 儲存） ───────
let _editing = false, _dirty = false;
let _previewOn = localStorage.getItem('vnsPreviewOn') !== '0';
let _previewReady = false;
let _previewDebounce = null;

function _previewFrame() { return document.getElementById('preview-frame'); }

function _ensurePreviewLoaded() {
  const f = _previewFrame();
  if (!f.src) f.src = '/engine/?devPreview=1';
}

// iframe 載入完成握手後才開始送內容
window.addEventListener('message', e => {
  if (e.origin !== location.origin) return;
  if (e.data?.type === 'vns-preview-ready') {
    _previewReady = true;
    sendPreview(0);
  }
});

function _editorLine() {
  const ed = document.getElementById('script-editor');
  return ed.value.slice(0, ed.selectionStart).split('\n').length;
}

/** 把編輯器內容 + 游標行送進預覽 iframe（debounce 合併連續輸入） */
function sendPreview(delay = 200) {
  if (!_editing || !_previewOn) return;
  clearTimeout(_previewDebounce);
  _previewDebounce = setTimeout(() => {
    if (!_previewReady) return;
    const f = _previewFrame();
    f.contentWindow?.postMessage({
      type: 'vns-preview',
      content: document.getElementById('script-editor').value,
      line: _editorLine(),
    }, location.origin);
  }, delay);
}

function _applyPreviewClass() {
  document.getElementById('content').classList.toggle('no-preview', !_previewOn);
  document.getElementById('btn-preview').classList.toggle('primary', _previewOn);
}

function togglePreview() {
  _previewOn = !_previewOn;
  localStorage.setItem('vnsPreviewOn', _previewOn ? '1' : '0');
  _applyPreviewClass();
  if (_previewOn) { _ensurePreviewLoaded(); sendPreview(0); }
}

function _exitEditUI() {
  _editing = false; _dirty = false;
  document.getElementById('content').classList.remove('editing');
  document.getElementById('btn-edit').textContent = '✎ 編輯';
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('btn-preview').style.display = 'none';
}

function toggleEdit() {
  if (!S.activeFile) return;
  if (_editing) {
    if (_dirty && !confirm('有未儲存的變更，捨棄？')) return;
    _exitEditUI();
    loadScript(S.activeFile);  // 重新渲染檢視（含 issue 標記）
    return;
  }
  _editing = true; _dirty = false;
  const ed = document.getElementById('script-editor');
  ed.value = S.content ?? '';
  document.getElementById('content').classList.add('editing');
  document.getElementById('btn-edit').textContent = '✕ 取消';
  document.getElementById('btn-save').style.display = '';
  document.getElementById('btn-preview').style.display = '';
  _applyPreviewClass();
  if (_previewOn) { _ensurePreviewLoaded(); sendPreview(0); }
  ed.focus();
}

async function saveScript() {
  if (!_editing || !S.activeFile) return;
  const content = document.getElementById('script-editor').value;
  try {
    const r = await fetch('/api/scripts/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: S.activeFile, content }),
    });
    const data = await r.json();
    if (!data.ok) { toast(`✗ 儲存失敗: ${data.error || r.status}`); return; }
    _dirty = false;
    S.content = content;
    toast(`✓ 已儲存 ${S.activeFile}（原檔備份 .bak）`);
    document.getElementById('current-file').textContent = S.activeFile;
    // 重新驗證 + 更新左欄統計，維持編輯模式不中斷
    const [scripts, issues] = await Promise.all([api('/api/scripts'), api('/api/validate')]);
    if (scripts) S.scripts = scripts;
    if (issues)  S.issues  = issues;
    renderScripts();
    renderValidate();
  } catch (e) { toast('✗ 儲存失敗: ' + e.message); }
}

document.getElementById('script-editor').addEventListener('input', () => {
  if (!_dirty) {
    _dirty = true;
    document.getElementById('current-file').innerHTML =
      `<span class="dirty-star">●</span> ${esc(S.activeFile || '')}`;
  }
  sendPreview(250);   // 打字 → 預覽（debounce 合併）
});

// 游標移動（方向鍵/點擊/選取）→ 預覽跟隨所在行
const _scriptEditor = document.getElementById('script-editor');
['keyup', 'click'].forEach(ev =>
  _scriptEditor.addEventListener(ev, () => sendPreview(120)));

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && _editing) {
    e.preventDefault();
    saveScript();
  }
  if (e.key === 'Escape' && document.getElementById('modal-import').classList.contains('open')) {
    closeImport();
  }
});

// 有未儲存變更時離頁警告
window.addEventListener('beforeunload', e => {
  if (_editing && _dirty) { e.preventDefault(); e.returnValue = ''; }
});

// ── Tools ─────────────────────────────────────────────────────────
let _grayscaleOn = false;

function toggleGrayscale() {
  _grayscaleOn = !_grayscaleOn;
  const btn = document.getElementById('btn-grayscale');
  if (_grayscaleOn) {
    btn.classList.add('active-toggle');
    document.querySelectorAll('.bg-thumb img, .expr-thumb img').forEach(img => {
      img.style.filter = 'grayscale(1) contrast(1.08) brightness(0.9)';
    });
  } else {
    btn.classList.remove('active-toggle');
    document.querySelectorAll('.bg-thumb img, .expr-thumb img').forEach(img => {
      img.style.filter = '';
    });
  }
}

async function runTool(tool, btnId) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.classList.add('running');
  btn.textContent = '⏳ ' + btn.textContent.replace(/^[⟳⏳✓✗]\s*/, '');
  document.getElementById('tool-log').textContent = `running ${tool}…`;

  try {
    const r = await fetch('/api/run-tool', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tool }),
    });
    const data = await r.json();
    btn.classList.remove('running');
    btn.classList.add(data.ok ? 'ok' : 'err');
    btn.textContent = (data.ok ? '✓' : '✗') + ' ' + btn.textContent.replace(/^[⟳⏳✓✗]\s*/, '');
    document.getElementById('tool-log').textContent =
      (data.stdout || '') + (data.stderr ? '\n---\n' + data.stderr : '');
    if (data.ok) {
      setTimeout(() => {
        btn.classList.remove('ok');
        btn.textContent = '⟳ ' + btn.textContent.replace(/^[✓✗]\s*/, '');
        refreshAll();
      }, 2500);
    }
  } catch (e) {
    btn.classList.remove('running');
    btn.classList.add('err');
    document.getElementById('tool-log').textContent = 'Error: ' + e.message;
  }
}

function testEffect(effect) {
  const params = { suspense_end: 'devEffect=suspense_end', chapter_end: 'devEffect=chapter_end', fade_out: 'devEffect=fade_out' };
  const qs = params[effect] || '';
  window.open(`/engine/?${qs}`, '_blank');
}

function testRain() {
  const intensity = document.getElementById('rain-intensity').value;
  const wind      = document.getElementById('rain-wind').value;
  window.open(`/engine/?devRain=${encodeURIComponent(intensity)}&devWind=${encodeURIComponent(wind)}`, '_blank');
}

// ── Style panel ────────────────────────────────────────────────
function sv(id, val) {
  document.getElementById(id).textContent = val;
}

const STYLE_DEFAULTS = {
  menuSepia: 0.18, grainOp: 0.55, vignetteOp: 0.62,
  bgGray: 90, textboxSepia: 0.18, chapterSepia: 0.16,
};

function getStyleParams() {
  return {
    menuSepia:    parseFloat(document.getElementById('s-menu-sepia').value),
    grainOp:      parseFloat(document.getElementById('s-grain').value),
    vignetteOp:   parseFloat(document.getElementById('s-vignette').value),
    bgGray:       parseInt(document.getElementById('s-bg-gray').value, 10),
    textboxSepia: parseFloat(document.getElementById('s-textbox-sepia').value),
    chapterSepia: parseFloat(document.getElementById('s-chapter-sepia').value),
  };
}

function previewStyle() {
  const qs = new URLSearchParams(window.location.search);
  const rain = qs.get('previewRain') || '';
  const style = JSON.stringify(getStyleParams());
  const url = `/engine/?devStyle=${encodeURIComponent(style)}${rain ? '&devRain=' + rain : ''}`;
  window.open(url, '_blank');
}

function copyStyleUrl(e) {
  const style = JSON.stringify(getStyleParams());
  const url = `${location.origin}/engine/?devStyle=${encodeURIComponent(style)}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = e.currentTarget;
    const orig = btn.textContent;
    btn.textContent = '✓ 已複製';
    setTimeout(() => btn.textContent = orig, 1600);
  });
}

function resetStyle() {
  const d = STYLE_DEFAULTS;
  const set = (id, val, dispId, disp) => {
    document.getElementById(id).value = val;
    document.getElementById(dispId).textContent = disp || val;
  };
  set('s-menu-sepia',    d.menuSepia,    's-menu-sepia-v',    d.menuSepia);
  set('s-grain',         d.grainOp,      's-grain-v',         d.grainOp);
  set('s-vignette',      d.vignetteOp,   's-vignette-v',      d.vignetteOp);
  set('s-bg-gray',       d.bgGray,       's-bg-gray-v',       d.bgGray + '%');
  set('s-textbox-sepia', d.textboxSepia, 's-textbox-sepia-v', d.textboxSepia);
  set('s-chapter-sepia', d.chapterSepia, 's-chapter-sepia-v', d.chapterSepia);
}

// ── Init ──────────────────────────────────────────────────────────
refreshAll();
</script>
