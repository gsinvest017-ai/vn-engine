  <path d="M 141,173 C 137,164 137,187 141,194 L 147,189 C 144,182 144,168 147,166 Z" fill="#b88862"/>
  <path d="M 259,173 C 263,164 263,187 259,194 L 253,189 C 256,182 256,168 253,166 Z" fill="#b88862"/>
