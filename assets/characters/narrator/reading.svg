    <radialGradient id="docGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e0d4a8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c8b880" stop-opacity="0.7"/>
