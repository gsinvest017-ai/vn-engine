  <path d="M 197,159 Q 211,153 227,157" stroke="#16101e" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <path d="M 196,207 C 195,216 196,222 200,226 C 204,222 205,216 204,207" fill="none" stroke="#9a6840" stroke-width="1.3" opacity="0.55"/>

