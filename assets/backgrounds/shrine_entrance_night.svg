<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#020208"/>
    <stop offset="55%" stop-color="#050510"/>
    <stop offset="100%" stop-color="#08070e"/>
  </linearGradient>
  <linearGradient id="ground_g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#0a0910"/>
    <stop offset="100%" stop-color="#040408"/>
  </linearGradient>
  <!-- Distant 7-11 green glow -->
  <radialGradient id="cvs_glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#00c040" stop-opacity="0.55"/>
    <stop offset="35%"  stop-color="#00a030" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#004010" stop-opacity="0.0"/>
  </radialGradient>
  <!-- Puddle reflection of green light -->
  <radialGradient id="puddle_g" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#00b838" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#004010" stop-opacity="0.0"/>
  </radialGradient>
  <radialGradient id="vign_n" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#000" stop-opacity="0.0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.72"/>
  </radialGradient>
  <filter id="cvs_soft" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="35"/>
  </filter>
  <filter id="rain_blur">
    <feGaussianBlur stdDeviation="0.4"/>
  </filter>
</defs>

<!-- Near-black sky -->
<rect width="1920" height="1080" fill="url(#sky)"/>

<!-- Distant convenience store glow (far right, lower) -->
<ellipse cx="1688" cy="625" rx="260" ry="180" fill="url(#cvs_glow)" filter="url(#cvs_soft)"/>
<ellipse cx="1688" cy="625" rx="100" ry="70"  fill="#00c040" opacity="0.12" filter="url(#cvs_soft)"/>

<!-- Convenience store sign structure (distant, small) -->
<rect x="1630" y="590" width="118" height="55" rx="3" fill="#003818" opacity="0.85"/>
<rect x="1633" y="593" width="112" height="49" rx="2" fill="#005828" opacity="0.75"/>
<!-- Lit sign face -->
<rect x="1635" y="595" width="108" height="45" rx="1" fill="#00a032" opacity="0.65"/>
<!-- Sign text illusion (glowing bars) -->
<rect x="1642" y="600" width="94" height="8"  rx="1" fill="#00ff60" opacity="0.55"/>
<rect x="1648" y="612" width="82" height="7"  rx="1" fill="#00dd50" opacity="0.45"/>
<rect x="1644" y="623" width="90" height="6"  rx="1" fill="#00ff60" opacity="0.40"/>
<rect x="1650" y="633" width="76" height="5"  rx="1" fill="#00dd50" opacity="0.35"/>

<!-- Power outage: dark building silhouettes (no windows lit) -->
<!-- Left side buildings -->
<rect x="0"   y="480" width="220" height="600" fill="#030308"/>
<rect x="200" y="520" width="160" height="560" fill="#040409"/>
<rect x="340" y="490" width="120" height="590" fill="#030308"/>
<!-- Right side buildings -->
<rect x="1480" y="505" width="130" height="575" fill="#030308"/>
<rect x="1590" y="475" width="160" height="605" fill="#040409"/>
<rect x="1730" y="510" width="190" height="570" fill="#030308"/>

<!-- Traditional shrine gate / pailou silhouette (center) -->
<!-- Main gate structure -->
<!-- Left column -->
<rect x="612" y="295" width="42" height="520" fill="#030308"/>
<!-- Right column -->
<rect x="1266" y="295" width="42" height="520" fill="#030308"/>
<!-- Cross beam / lintel -->
<rect x="580" y="280" width="760" height="32" fill="#030308"/>
<!-- Roof ridge on lintel -->
