<!-- Power lines (barely visible, just outlines in near darkness) -->
<g stroke="#080810" fill="none" opacity="0.8">
  <path d="M 0,310 Q 960,345 1920,318" stroke-width="1.5"/>
  <path d="M 0,332 Q 960,364 1920,338" stroke-width="1.2"/>
</g>

<!-- Very dark foreground area below gate (puddle-covered ground) -->
