<path d="M 580,270 Q 620,258 660,265 L 658,278 Q 620,272 582,282 Z" fill="#030308"/>
<path d="M 1340,270 Q 1300,258 1260,265 L 1262,278 Q 1300,272 1338,282 Z" fill="#030308"/>
