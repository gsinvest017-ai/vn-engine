<rect x="654"  y="415" width="25" height="125" fill="#030308" opacity="0.8"/>
<rect x="1241" y="415" width="25" height="125" fill="#030308" opacity="0.8"/>

<!-- Wooden gate doors (slightly ajar, ominous) -->
<rect x="679"  y="480" width="130" height="295" rx="3" fill="#040409"/>
<rect x="1111" y="480" width="130" height="295" rx="3" fill="#040409"/>
<!-- Door panels -->
<rect x="683"  y="485" width="60"  height="142" rx="1" fill="#030307" opacity="0.7"/>
<rect x="747"  y="485" width="58"  height="142" rx="1" fill="#030307" opacity="0.7"/>
<rect x="1115" y="485" width="58"  height="142" rx="1" fill="#030307" opacity="0.7"/>
<rect x="1177" y="485" width="60"  height="142" rx="1" fill="#030307" opacity="0.7"/>
<!-- Crack of darkness through slightly open gate (green light hint through it) -->
<rect x="808" y="480" width="18" height="295" fill="#001808" opacity="0.95"/>
<!-- Faint green glow bleeding through crack from beyond -->
<rect x="810" y="490" width="14" height="275" fill="#00a030" opacity="0.03"/>

<!-- Ground — wet dark asphalt / cobblestone -->
<rect x="0" y="760" width="1920" height="320" fill="url(#ground_g)"/>

<!-- Puddles on ground (reflecting green glow) -->
<ellipse cx="1688" cy="855" rx="280" ry="50"  fill="url(#puddle_g)" opacity="0.6"/>
<ellipse cx="1550" cy="880" rx="120" ry="22"  fill="#00b838" opacity="0.06"/>
<ellipse cx="1780" cy="870" rx="95"  ry="18"  fill="#00b838" opacity="0.05"/>
<ellipse cx="780"  cy="840" rx="90"  ry="16"  fill="#060610"  opacity="0.5"/>
