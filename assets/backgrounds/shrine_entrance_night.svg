<ellipse cx="1150" cy="850" rx="80"  ry="14"  fill="#060610"  opacity="0.5"/>
<!-- Light reflections in puddles -->
<ellipse cx="780"  cy="840" rx="20" ry="4" fill="#c0c0d0" opacity="0.05"/>

