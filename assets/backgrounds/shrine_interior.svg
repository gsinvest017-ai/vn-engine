<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
<defs>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#060608"/>
    <stop offset="60%" stop-color="#0e0b0c"/>
    <stop offset="100%" stop-color="#13100e"/>
  </linearGradient>
  <linearGradient id="floor_g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#141210"/>
    <stop offset="100%" stop-color="#090807"/>
  </linearGradient>
  <linearGradient id="altar_w" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#3a2a18"/>
    <stop offset="100%" stop-color="#1e1410"/>
  </linearGradient>
  <radialGradient id="altar_amb" cx="50%" cy="85%" r="60%">
    <stop offset="0%"  stop-color="#ff8020" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
  </radialGradient>
  <radialGradient id="vign_r" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#000" stop-opacity="0.0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.78"/>
  </radialGradient>
  <filter id="flame_soft" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="24"/>
  </filter>
  <filter id="glow_c" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="smoke_f">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
</defs>

<!-- Base wall -->
<rect width="1920" height="1080" fill="url(#wall)"/>

<!-- Ceiling with dark wooden beams -->
<rect width="1920" height="175" fill="#050507"/>
<rect x="0"  y="28"  width="1920" height="18" fill="#0d0a07" opacity="0.85"/>
<rect x="0"  y="72"  width="1920" height="16" fill="#0b0806" opacity="0.80"/>
<rect x="0"  y="114" width="1920" height="18" fill="#0d0a07" opacity="0.85"/>
<rect x="0"  y="152" width="1920" height="20" fill="#0b0806" opacity="0.75"/>
<!-- Vertical support columns -->
<rect x="176"  y="0" width="28" height="1080" fill="#0d0a07" opacity="0.65"/>
<rect x="1716" y="0" width="28" height="1080" fill="#0d0a07" opacity="0.65"/>
<rect x="476"  y="0" width="18" height="560"  fill="#0c0906" opacity="0.50"/>
<rect x="1426" y="0" width="18" height="560"  fill="#0c0906" opacity="0.50"/>

<!-- Salt / moisture stains on walls -->
<ellipse cx="340"  cy="420" rx="82"  ry="125" fill="#e0d8c8" opacity="0.030"/>
<ellipse cx="310"  cy="455" rx="50"  ry="80"  fill="#e8e0d0" opacity="0.022"/>
<ellipse cx="380"  cy="510" rx="35"  ry="55"  fill="#d8d0c0" opacity="0.018"/>
<ellipse cx="120"  cy="550" rx="60"  ry="100" fill="#e0d8c8" opacity="0.025"/>
<ellipse cx="1560" cy="400" rx="75"  ry="115" fill="#e0d8c8" opacity="0.030"/>
<ellipse cx="1595" cy="445" rx="48"  ry="75"  fill="#e8e0d0" opacity="0.022"/>
<ellipse cx="1800" cy="540" rx="55"  ry="90"  fill="#d8d0c0" opacity="0.025"/>
<ellipse cx="860"  cy="580" rx="55"  ry="88"  fill="#d0c8b8" opacity="0.022"/>
<ellipse cx="1100" cy="560" rx="50"  ry="80"  fill="#d8d0c0" opacity="0.022"/>

<!-- Carved arch over altar area -->
<path d="M 460,175 Q 460,340 560,412 Q 760,458 960,438 Q 1160,418 1360,412 Q 1460,340 1460,175"
      stroke="#2a1c10" stroke-width="3" fill="none" opacity="0.40"/>
<path d="M 560,175 L 560,412" stroke="#2a1c10" stroke-width="2" opacity="0.25"/>
<path d="M 1360,175 L 1360,412" stroke="#2a1c10" stroke-width="2" opacity="0.25"/>

<!-- Floor area -->
<rect x="0" y="760" width="1920" height="320" fill="url(#floor_g)"/>
<!-- Floor tile grid (subtle) -->
<g opacity="0.07" stroke="#282420" stroke-width="1" fill="none">
  <line x1="0" y1="790" x2="1920" y2="790"/>
  <line x1="0" y1="850" x2="1920" y2="850"/>
  <line x1="0" y1="910" x2="1920" y2="910"/>
  <line x1="0" y1="970" x2="1920" y2="970"/>
  <line x1="0" y1="1030" x2="1920" y2="1030"/>
  <line x1="240"  y1="760" x2="240"  y2="1080"/>
  <line x1="480"  y1="760" x2="480"  y2="1080"/>
  <line x1="720"  y1="760" x2="720"  y2="1080"/>
  <line x1="960"  y1="760" x2="960"  y2="1080"/>
  <line x1="1200" y1="760" x2="1200" y2="1080"/>
  <line x1="1440" y1="760" x2="1440" y2="1080"/>
  <line x1="1680" y1="760" x2="1680" y2="1080"/>
</g>
<ellipse cx="960" cy="825" rx="420" ry="55" fill="#ff8020" opacity="0.038"/>

<!-- Altar table -->
<rect x="548" y="615" width="22" height="175" rx="3" fill="#2a1c10"/>
<rect x="1350" y="615" width="22" height="175" rx="3" fill="#2a1c10"/>
<rect x="648"  y="624" width="17" height="166" rx="2" fill="#2a1c10" opacity="0.7"/>
<rect x="1255" y="624" width="17" height="166" rx="2" fill="#2a1c10" opacity="0.7"/>
<rect x="537" y="588" width="846" height="38" rx="4" fill="url(#altar_w)"/>
<rect x="537" y="624" width="846" height="18" rx="2" fill="#261608" opacity="0.9"/>
<path d="M 537,626 Q 700,648 960,640 Q 1210,648 1383,626 L 1383,690 Q 1210,712 960,704 Q 700,712 537,690 Z"
      fill="#1a0808" opacity="0.82"/>

<!-- Altar back shelf -->
<rect x="638" y="350" width="644" height="246" rx="3" fill="#0f0a08" opacity="0.92"/>
<rect x="636" y="340" width="648" height="18"  rx="2" fill="#2c1c0e" opacity="0.9"/>

<!-- Deity statue silhouette -->
<rect x="878" y="484" width="164" height="28" rx="3" fill="#201410" opacity="0.85"/>
<ellipse cx="960" cy="440" rx="58" ry="68" fill="#1b1008"/>
<ellipse cx="960" cy="362" rx="37" ry="44" fill="#1b1008"/>
<circle cx="960" cy="360" r="58"  fill="none" stroke="#3c2212" stroke-width="3"   opacity="0.45"/>
<circle cx="960" cy="360" r="65"  fill="none" stroke="#2a1808" stroke-width="1.5" opacity="0.28"/>
<circle cx="960" cy="360" r="74"  fill="none" stroke="#1e1206" stroke-width="1"   opacity="0.18"/>
<path d="M 902,422 Q 848,428 818,445" stroke="#1b1008" stroke-width="22" fill="none" stroke-linecap="round"/>
<path d="M 1018,422 Q 1072,428 1102,445" stroke="#1b1008" stroke-width="22" fill="none" stroke-linecap="round"/>
<ellipse cx="960" cy="410" rx="190" ry="155" fill="#ff8020" opacity="0.032" filter="url(#flame_soft)"/>

<!-- Incense burner and sticks -->
<rect x="944" y="572" width="32" height="14" rx="4" fill="#322012"/>
<rect x="946" y="576" width="28" height="6"  rx="2" fill="#1a1008" opacity="0.5"/>
<line x1="957" y1="574" x2="950" y2="455" stroke="#2c1c0a" stroke-width="2.5"/>
<line x1="963" y1="572" x2="960" y2="450" stroke="#2c1c0a" stroke-width="2.5"/>
<line x1="969" y1="574" x2="974" y2="457" stroke="#2c1c0a" stroke-width="2.5"/>
<circle cx="950" cy="455" r="2.5" fill="#ff6010" opacity="0.88" filter="url(#glow_c)"/>
<circle cx="960" cy="450" r="2.5" fill="#ff6010" opacity="0.78" filter="url(#glow_c)"/>
<circle cx="974" cy="457" r="2.5" fill="#ff6010" opacity="0.85" filter="url(#glow_c)"/>
<!-- Smoke wisps -->
<g filter="url(#smoke_f)" opacity="0.18" stroke="#b8b0a0" stroke-width="1.5" fill="none">
  <path d="M 950,453 Q 944,435 950,418 Q 956,400 948,384 Q 942,368 948,350"/>
  <path d="M 960,448 Q 966,430 960,413 Q 954,396 962,379 Q 968,362 962,345"/>
  <path d="M 974,455 Q 980,437 974,419 Q 968,401 976,384 Q 982,367 976,349"/>
</g>

<!-- Red paper lanterns -->
<line x1="475"  y1="30" x2="475"  y2="198" stroke="#2c1810" stroke-width="2"/>
<ellipse cx="475"  cy="230" rx="23" ry="36" fill="#920e0e" opacity="0.72"/>
<rect x="464" y="194" width="22" height="8" rx="2" fill="#6e0808" opacity="0.9"/>
<rect x="464" y="258" width="22" height="8" rx="2" fill="#6e0808" opacity="0.9"/>
<ellipse cx="475" cy="230" rx="18" ry="28" fill="#cc2010" opacity="0.18" filter="url(#flame_soft)"/>

<line x1="1445" y1="30" x2="1445" y2="198" stroke="#2c1810" stroke-width="2"/>
<ellipse cx="1445" cy="230" rx="23" ry="36" fill="#920e0e" opacity="0.72"/>
<rect x="1434" y="194" width="22" height="8" rx="2" fill="#6e0808" opacity="0.9"/>
<rect x="1434" y="258" width="22" height="8" rx="2" fill="#6e0808" opacity="0.9"/>
<ellipse cx="1445" cy="230" rx="18" ry="28" fill="#cc2010" opacity="0.18" filter="url(#flame_soft)"/>

<line x1="960" y1="0" x2="960" y2="205" stroke="#2c1810" stroke-width="2.5"/>
<ellipse cx="960" cy="240" rx="30" ry="45" fill="#920e0e" opacity="0.78"/>
<rect x="946" y="195" width="28" height="10" rx="3" fill="#6e0808" opacity="0.9"/>
<rect x="946" y="282" width="28" height="10" rx="3" fill="#6e0808" opacity="0.9"/>
<ellipse cx="960" cy="240" rx="22" ry="34" fill="#ff4010" opacity="0.15"/>
<ellipse cx="960" cy="240" rx="38" ry="54" fill="#cc2010" opacity="0.07" filter="url(#flame_soft)"/>

