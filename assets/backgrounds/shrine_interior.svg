<ellipse cx="754" cy="576" rx="4" ry="8" fill="#ffd050" opacity="0.88" filter="url(#glow_c)"/>

<!-- Right candle group -->
<ellipse cx="1220" cy="558" rx="110" ry="90" fill="#ffa030" opacity="0.07" filter="url(#flame_soft)"/>
<rect x="1196" y="577" width="12" height="31" rx="2" fill="#ebe0cc"/>
<rect x="1213" y="574" width="11" height="34" rx="2" fill="#ebe0cc"/>
<rect x="1235" y="580" width="13" height="28" rx="2" fill="#ebe0cc"/>
<ellipse cx="1202" cy="576" rx="4" ry="8" fill="#ffd050" opacity="0.88" filter="url(#glow_c)"/>
<ellipse cx="1218" cy="573" rx="4" ry="8" fill="#ffb030" opacity="0.85" filter="url(#glow_c)"/>
<ellipse cx="1241" cy="579" rx="5" ry="9" fill="#ffd050" opacity="0.92" filter="url(#glow_c)"/>

<!-- Ambient altar light on wall -->
<ellipse cx="960" cy="580" rx="620" ry="280" fill="url(#altar_amb)"/>
<ellipse cx="380"  cy="540" rx="350" ry="280" fill="#ff8020" opacity="0.030" filter="url(#flame_soft)"/>
<ellipse cx="1540" cy="540" rx="350" ry="280" fill="#ff8020" opacity="0.030" filter="url(#flame_soft)"/>

<!-- Heavy vignette -->
<rect width="1920" height="1080" fill="url(#vign_r)"/>
<rect x="0"    y="0" width="220"  height="1080" fill="#000" opacity="0.52"/>
<rect x="1700" y="0" width="220"  height="1080" fill="#000" opacity="0.52"/>
<rect x="0"    y="0" width="1920" height="90"   fill="#000" opacity="0.65"/>
<rect x="0"  y="990" width="1920" height="90"   fill="#000" opacity="0.55"/>
</svg>
