<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
<defs>
  <linearGradient id="room_bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#060610"/>
    <stop offset="100%" stop-color="#0a090e"/>
  </linearGradient>
  <linearGradient id="wood_s" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#2a1e10"/>
    <stop offset="100%" stop-color="#1a120a"/>
  </linearGradient>
  <linearGradient id="wood_d" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#3a2818"/>
    <stop offset="100%" stop-color="#241a0e"/>
  </linearGradient>
  <linearGradient id="lamp_cone" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#f0c060" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#c09030" stop-opacity="0.02"/>
  </linearGradient>
  <linearGradient id="win_night" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#04040c"/>
    <stop offset="100%" stop-color="#060608"/>
  </linearGradient>
  <radialGradient id="vign_d" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#000" stop-opacity="0.0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.80"/>
  </radialGradient>
  <filter id="lamp_g" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="32"/>
  </filter>
  <filter id="glow_l" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="dust">
    <feGaussianBlur stdDeviation="1.5"/>
  </filter>
</defs>

