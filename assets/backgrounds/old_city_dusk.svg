<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d0816"/>
      <stop offset="25%"  stop-color="#2a0f08"/>
      <stop offset="55%"  stop-color="#8b3a10"/>
      <stop offset="78%"  stop-color="#d4693c"/>
      <stop offset="100%" stop-color="#e8923a"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a0e06"/>
      <stop offset="100%" stop-color="#0d0804"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Distant haze -->
  <ellipse cx="960" cy="720" rx="800" ry="180" fill="#e8923a" opacity="0.12"/>

  <!-- Background buildings silhouettes -->
  <rect x="0"    y="580" width="120" height="500" fill="#0a0604"/>
  <rect x="80"   y="520" width="90"  height="560" fill="#0a0604"/>
  <rect x="150"  y="560" width="200" height="520" fill="#0a0604"/>
  <rect x="320"  y="490" width="80"  height="590" fill="#0a0604"/>
  <rect x="380"  y="530" width="150" height="550" fill="#0a0604"/>
  <rect x="500"  y="500" width="60"  height="580" fill="#0a0604"/>
  <rect x="540"  y="460" width="110" height="620" fill="#0a0604"/>
  <rect x="620"  y="540" width="180" height="540" fill="#0a0604"/>
  <rect x="780"  y="470" width="90"  height="610" fill="#0a0604"/>
  <rect x="850"  y="510" width="120" height="570" fill="#0a0604"/>
  <rect x="960"  y="480" width="100" height="600" fill="#0a0604"/>
  <rect x="1040" y="520" width="200" height="560" fill="#0a0604"/>
  <rect x="1220" y="490" width="80"  height="590" fill="#0a0604"/>
  <rect x="1280" y="535" width="150" height="545" fill="#0a0604"/>
  <rect x="1410" y="500" width="100" height="580" fill="#0a0604"/>
  <rect x="1490" y="460" width="130" height="620" fill="#0a0604"/>
  <rect x="1600" y="530" width="160" height="550" fill="#0a0604"/>
  <rect x="1740" y="490" width="90"  height="590" fill="#0a0604"/>
  <rect x="1820" y="550" width="100" height="530" fill="#0a0604"/>

  <!-- Mid buildings (slightly lighter) -->
  <rect x="100"  y="640" width="180" height="440" fill="#100a06"/>
  <rect x="260"  y="600" width="100" height="480" fill="#100a06"/>
  <rect x="440"  y="620" width="200" height="460" fill="#100a06"/>
  <rect x="620"  y="640" width="120" height="440" fill="#100a06"/>
  <rect x="720"  y="600" width="180" height="480" fill="#100a06"/>
  <rect x="880"  y="650" width="90"  height="430" fill="#100a06"/>
  <rect x="960"  y="610" width="200" height="470" fill="#100a06"/>
  <rect x="1140" y="630" width="150" height="450" fill="#100a06"/>
  <rect x="1280" y="600" width="120" height="480" fill="#100a06"/>
  <rect x="1380" y="640" width="200" height="440" fill="#100a06"/>
  <rect x="1560" y="610" width="110" height="470" fill="#100a06"/>
  <rect x="1660" y="640" width="180" height="440" fill="#100a06"/>
  <rect x="1820" y="620" width="100" height="460" fill="#100a06"/>

  <!-- Power lines -->
  <line x1="0" y1="560" x2="300"  y2="570" stroke="#1a1208" stroke-width="1.5" opacity="0.7"/>
  <line x1="280" y1="568" x2="600" y2="555" stroke="#1a1208" stroke-width="1.5" opacity="0.7"/>
  <line x1="580" y1="557" x2="900" y2="565" stroke="#1a1208" stroke-width="1.5" opacity="0.7"/>
  <line x1="880" y1="563" x2="1200" y2="552" stroke="#1a1208" stroke-width="1.5" opacity="0.7"/>
  <line x1="1180" y1="555" x2="1500" y2="568" stroke="#1a1208" stroke-width="1.5" opacity="0.7"/>
  <line x1="1480" y1="566" x2="1920" y2="555" stroke="#1a1208" stroke-width="1.5" opacity="0.7"/>

  <!-- Utility poles -->
  <rect x="298"  y="400" width="4" height="175" fill="#1a1208"/>
  <rect x="578"  y="380" width="4" height="180" fill="#1a1208"/>
  <rect x="878"  y="395" width="4" height="175" fill="#1a1208"/>
  <rect x="1178" y="385" width="4" height="175" fill="#1a1208"/>
  <rect x="1478" y="400" width="4" height="175" fill="#1a1208"/>

  <!-- Ground -->
  <rect x="0" y="850" width="1920" height="230" fill="url(#ground)"/>

  <!-- Wet street reflection -->
  <ellipse cx="960" cy="920" rx="700" ry="40" fill="#d4693c" opacity="0.08"/>

  <!-- Foreground rain puddles -->
  <ellipse cx="200"  cy="970" rx="60"  ry="8" fill="#c05a20" opacity="0.12"/>
  <ellipse cx="600"  cy="990" rx="80"  ry="10" fill="#c05a20" opacity="0.10"/>
  <ellipse cx="1200" cy="975" rx="70"  ry="9" fill="#c05a20" opacity="0.11"/>
  <ellipse cx="1700" cy="985" rx="65"  ry="8" fill="#c05a20" opacity="0.10"/>

  <!-- Labels (dev mode) -->
  <text x="30" y="50" font-family="monospace" font-size="18" fill="rgba(200,180,100,0.4)">BG: old_city_dusk [placeholder]</text>
</svg>
