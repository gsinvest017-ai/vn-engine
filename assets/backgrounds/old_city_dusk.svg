<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#060412"/>
    <stop offset="22%" stop-color="#1a0a28"/>
    <stop offset="45%" stop-color="#4c1812"/>
    <stop offset="68%" stop-color="#943a10"/>
    <stop offset="85%" stop-color="#c86020"/>
    <stop offset="100%" stop-color="#e07830"/>
  </linearGradient>
  <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#100e18"/>
    <stop offset="100%" stop-color="#070508"/>
  </linearGradient>
  <radialGradient id="sun_glow" cx="50%" cy="100%" r="60%">
    <stop offset="0%"  stop-color="#e07828" stop-opacity="0.22"/>
    <stop offset="60%" stop-color="#802010" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
  </radialGradient>
  <radialGradient id="lamp_halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#ffb030" stop-opacity="0.7"/>
    <stop offset="35%" stop-color="#ff8010" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ff5000" stop-opacity="0.0"/>
  </radialGradient>
  <filter id="soft" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="22"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="haze">
    <feGaussianBlur stdDeviation="2.5"/>
  </filter>
  <radialGradient id="vign" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#000" stop-opacity="0.0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.58"/>
  </radialGradient>
</defs>

<!-- Sky -->
<rect width="1920" height="1080" fill="url(#sky)"/>
<!-- Sunset atmospheric glow -->
<rect width="1920" height="1080" fill="url(#sun_glow)"/>
<ellipse cx="960" cy="1080" rx="900" ry="380" fill="#d06018" opacity="0.13" filter="url(#soft)"/>

